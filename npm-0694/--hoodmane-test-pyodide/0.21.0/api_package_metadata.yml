    "browser": {
        "child_process": false,
        "crypto": false,
        "fs": false,
        "fs/promises": false,
        "path": false,
        "vm": false,
        "ws": false
    },
    "scripts": {
        "test": "npm-run-all test:*",
        "test:unit": "cross-env TEST_NODE=1 ts-mocha -p tsconfig.test.json test/unit/**/*.test.ts",
        "test:node": "cross-env TEST_NODE=1 mocha test/integration/**/*.test.js",
        "test:browser": "mocha test/integration/**/*.test.js",
        "coverage": "cross-env TEST_NODE=1 npm-run-all coverage:*",
        "coverage:build": "nyc npm run test:node"
    },
    "mocha": {
        "bail": false,
        "timeout": 30000,
        "full-trace": true,
        "inline-diffs": true,
        "check-leaks": false,
        "global": [
            "pyodide",
            "page",
            "chai"
        ],
        "file": [
            "test/conftest.js"
        ]
    },
    "nyc": {
        "reporter": [
            "html",
            "text-summary"
        ],
        "include": [
            "*.ts"
        ],
        "all": true,
        "clean": true,
        "cache": false,
        "instrument": false,
        "checkCoverage": true,
        "statements": 95,
        "functions": 95,
        "branches": 80,
        "lines": 95
    },
    "tsd": {
        "compilerOptions": {
            "lib": [
                "ES2017",
                "DOM"
            ]
        }
    },
